<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            color: #1f2937;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        .logout-btn {
            border: 0;
            border-radius: 6px;
            padding: 10px 16px;
            background: #b91c1c;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #991b1b;
        }

        main {
            padding: 28px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Admin</h1>
        <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
    </header>

    <main>
        <p>Selamat datang di dashboard admin.</p>
    </main>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        });
    </script>
</body>

</html>
