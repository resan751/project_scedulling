<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RiseGig</title>
    
    <!-- Global Design System CSS -->
    <link rel="stylesheet" href="/css/global.css">
    <!-- Page Specific Override CSS -->
    <link rel="stylesheet" href="/css/register.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Menggunakan struktur kelas yang sama dengan login page di style.css -->
    <div class="page active" id="page-register">
        
        <!-- Background Orbs (Sama persis dengan Login) -->
        <div class="login-bg-orb o1"></div>
        <div class="login-bg-orb o2"></div>
        <div class="login-bg-orb o3"></div>

        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon"><i class="fas fa-briefcase"></i></div>
                <div class="login-brand-name">Rise<span>Gig</span></div>
            </div>
            
            <h2 class="login-title">Daftar Akun Baru</h2>
            <p class="login-subtitle">Lengkapi data diri Anda untuk mulai menggunakan sistem</p>

            <form class="login-form" id="form-register">
                
                <!-- Nama Lengkap -->
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user fi"></i>
                        <input type="text" class="form-input" name="nama_user" placeholder="Masukkan nama lengkap" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope fi"></i>
                        <input type="email" class="form-input" name="email" placeholder="contoh@email.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock fi"></i>
                        <input type="password" class="form-input" name="password" placeholder="Buat password yang aman" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Role User</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user-tag fi"></i>
                        <select class="form-input" name="role_user" required>
                            <option value="freelance" selected>Freelance / Karyawan</option>
                            <option value="sponsor">Sponsor</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-login">Daftar Sekarang</button>
            </form>

            <div class="login-footer">
                Sudah punya akun? <a href="login.html" style="color: var(--purple-300); font-weight: 700; text-decoration: underline;">Login di sini</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('form-register').addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(event.currentTarget);
            const payload = {
                nama_user: String(formData.get('nama_user') || '').trim(),
                email: String(formData.get('email') || '').trim(),
                password: String(formData.get('password') || ''),
                role_user: String(formData.get('role_user') || '').trim(),
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || 'Registrasi gagal.');
                    return;
                }

                alert(result.message || 'Registrasi berhasil.');
                window.location.href = result.redirectTo || '/login.html';
            } catch (error) {
                alert('Terjadi kesalahan saat registrasi.');
            }
        });
    </script>
</body>
</html>
