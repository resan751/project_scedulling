<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/css/user-create.css">
</head>

<body>
    <header>
        <h1>Register</h1>
        <div class="header-actions">
            <a class="link-btn" href="/login.html">Login</a>
        </div>
    </header>

    <main>
        <form class="form-card" id="registerForm">
            <label for="nama_user">Nama</label>
            <input type="text" id="nama_user" name="nama_user" autocomplete="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>

            <p class="message" id="formMessage" aria-live="polite"></p>
            <button class="submit-btn" id="submitBtn" type="submit">Register</button>
        </form>
    </main>

    <script>
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const formMessage = document.getElementById('formMessage');

        async function readJson(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return response.json();
            }

            return { message: 'Server mengirim response yang tidak valid.' };
        }

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(registerForm);
            const payload = Object.fromEntries(formData.entries());

            formMessage.textContent = '';
            formMessage.className = 'message';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Mendaftar...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                const result = await readJson(response);

                if (!response.ok) {
                    throw new Error(result.message || 'Registrasi gagal.');
                }

                formMessage.textContent = result.message || 'Registrasi berhasil. Silakan login.';
                formMessage.classList.add('success');
                registerForm.reset();
                window.setTimeout(() => {
                    window.location.href = result.redirectTo || '/login.html';
                }, 900);
            } catch (error) {
                formMessage.textContent = error.message;
                formMessage.classList.add('error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>

</html>
