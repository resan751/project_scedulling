<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manager</title>
    <link rel="stylesheet" href="/css/dashboard-manager.css">
</head>

<body>
    <header>
        <h1>Manager</h1>
        <div class="header-actions">
            <a class="link-btn" href="/page/manager/user-create.html">Create User</a>
            <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
        </div>
    </header>

    <main>
        <p>Selamat datang di dashboard manager.</p>
    </main>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        });
    </script>
</body>

</html>
