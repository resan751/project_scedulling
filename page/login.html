<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management System</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="page">

        <!-- LEFT -->
        <div class="left">
            <div class="oval"></div>
            <div class="dot d1"></div>
            <div class="dot d2"></div>
            <div class="dot d3"></div>
            <div class="dot d4"></div>
            <div class="dot d5"></div>

            <!-- Illustration -->
            <svg class="illus" viewBox="0 0 265 265" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="22" y="34" width="90" height="112" rx="7" stroke="#c86246" stroke-width="4.5" fill="none" />
                <rect x="52" y="24" width="30" height="22" rx="5" stroke="#c86246" stroke-width="4" fill="none" />
                <polyline points="33,70 40,77 52,62" stroke="#c86246" stroke-width="3.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
                <line x1="58" y1="70" x2="100" y2="70" stroke="#c86246" stroke-width="3.5" stroke-linecap="round" />
                <polyline points="33,95 40,102 52,87" stroke="#c86246" stroke-width="3.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
                <line x1="58" y1="95" x2="100" y2="95" stroke="#c86246" stroke-width="3.5" stroke-linecap="round" />
                <polyline points="33,120 40,127 52,112" stroke="#c86246" stroke-width="3.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
                <line x1="58" y1="120" x2="100" y2="120" stroke="#c86246" stroke-width="3.5" stroke-linecap="round" />
                <rect x="22" y="194" width="220" height="9" rx="4.5" fill="#c86246" />
                <rect x="92" y="162" width="96" height="33" rx="5" stroke="#c86246" stroke-width="4.5" fill="none" />
                <rect x="100" y="128" width="80" height="38" rx="5" stroke="#c86246" stroke-width="4.5" fill="none" />
                <circle cx="150" cy="104" r="22" stroke="#c86246" stroke-width="4.5" fill="none" />
                <path d="M128,162 Q128,142 150,142 Q172,142 172,162" stroke="#c86246" stroke-width="4.5" fill="none"
                    stroke-linecap="round" />
                <circle cx="210" cy="68" r="34" stroke="#c86246" stroke-width="4.5" fill="none" />
                <line x1="210" y1="46" x2="210" y2="68" stroke="#c86246" stroke-width="4" stroke-linecap="round" />
                <line x1="210" y1="68" x2="226" y2="78" stroke="#c86246" stroke-width="4" stroke-linecap="round" />
                <rect x="30" y="166" width="13" height="28" rx="2.5" fill="#c86246" />
                <rect x="50" y="152" width="13" height="42" rx="2.5" fill="#c86246" />
                <rect x="70" y="160" width="13" height="34" rx="2.5" fill="#c86246" />
                <polyline points="136,190 158,168 178,176 208,148" stroke="#c86246" stroke-width="4.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
                <polyline points="200,142 210,148 204,158" stroke="#c86246" stroke-width="4.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>

            <!-- Wave divider -->
            <!--
      The wave divider in the reference image shows:
      - A smooth S-curve brown/dark-chocolate band that separates the left cream panel
        from the right golden panel.
      - The band is widest around the vertical center, narrowing at the top and bottom.
      - Left of the band = cream (#f4eedf), right of the band = gold (#dfa95a).
      
      Strategy: viewBox 0 0 108 100 (using percentage-style units so it scales)
      Left wave edge (boundary cream | brown): cubic S-curve
      Right wave edge (boundary brown | gold): parallel S-curve offset ~22 units right
    -->
            <div class="wave-wrap">
                <svg viewBox="0 0 108 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

                    <!-- Gold background (right panel color) fills everything -->
                    <rect x="0" y="0" width="108" height="800" fill="#dfa95a" />

                    <!-- Cream left region — defined by the left wave edge -->
                    <!--
          Left boundary of the brown band (= right boundary of cream zone):
          Start top-left off-screen, S-curve down.
          The wave goes:
            top ~x=22 → bulges right to ~x=65 at y=280
            → swings left to ~x=20 at y=520
            → bulges right again to ~x=55 at y=800
        -->
                    <path d="M 0,0
             L 22,0
             C 22,0  65,80  65,280
             C 65,460  20,470  20,520
             C 20,590  55,700  55,800
             L 0,800
             Z" fill="#f4eedf" />

                    <!--
          Brown band — sits between the left wave edge and right wave edge.
          Right boundary is offset ~24px to the right of the left boundary,
          following the same S-curve shape.
        -->
                    <path d="M 22,0
             C 22,0  65,80  65,280
             C 65,460  20,470  20,520
             C 20,590  55,700  55,800
 
             L 80,800
             C 80,700  46,590  46,520
             C 46,470  88,460  88,280
             C 88,80   46,0   46,0
             Z" fill="#5a2d14" />

                </svg>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="form-box">

                <div class="title">
                    <span>SIGN</span>
                    <span class="gap"></span>
                    <span class="tie-wrap" aria-label="tie icon">
                        <svg viewBox="0 0 28 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Tie knot -->
                            <polygon points="14,1 26,7 21,16 7,16 2,7" fill="#1f110a" />
                            <!-- Narrow neck -->
                            <rect x="11" y="16" width="6" height="7" fill="#1f110a" />
                            <!-- Wide blade -->
                            <polygon points="8,23 20,23 17,49 11,49" fill="#1f110a" />
                        </svg>
                    </span>
                    <span>N</span>
                </div>

                <label for="uname">Unsername</label>
                <input type="text" id="uname" placeholder="Enter your unsername" autocomplete="username" />

                <label for="pw">Password</label>
                <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password" />

                <span class="forgot" id="forgotBtn">Forgot Password</span>
                <button class="btn" id="loginBtn" onclick="doLogin()">LOGIN</button>
            </div>
        </div>

    </div>

</body>

</html>
