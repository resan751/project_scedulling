<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RiseGig</title>
    
    <!-- Global Design System CSS -->
    <link rel="stylesheet" href="/css/global.css">
    <!-- Page Specific Override CSS -->
    <link rel="stylesheet" href="/css/login.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Menggunakan struktur kelas yang sama dengan register page di style.css -->
    <div class="page active" id="page-login">
        
        <!-- Background Orbs (Sama persis dengan Register) -->
        <div class="login-bg-orb o1"></div>
        <div class="login-bg-orb o2"></div>
        <div class="login-bg-orb o3"></div>

        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon"><i class="fas fa-briefcase"></i></div>
                <div class="login-brand-name">Rise<span>Gig</span></div>
            </div>
            
            <h2 class="login-title">Selamat Datang</h2>
            <p class="login-subtitle">Sistem Penjadwalan & Laporan Jobdesk Kerja</p>

            <form class="login-form" id="form-login">
                
                <!-- Username -->
                <div class="form-group">
                    <label class="form-label">Nama Pengguna</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user fi"></i>
                        <input type="text" class="form-input" name="nama_user" placeholder="Masukkan nama pengguna" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock fi"></i>
                        <input type="password" class="form-input" name="password" placeholder="Masukkan password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="login-footer">
                Belum punya akun? <a href="register.html" style="color: var(--purple-300); font-weight: 700; text-decoration: underline;">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        // Form Login Handler
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nama_user = document.querySelector('input[name="nama_user"]').value;
            const password = document.querySelector('input[name="password"]').value;

            if (!nama_user || !password) {
                alert('Nama pengguna dan password harus diisi');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        nama_user,
                        password,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || 'Login gagal');
                    return;
                }

                // Login berhasil, redirect ke dashboard
                if (data.redirectTo) {
                    window.location.href = data.redirectTo;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Terjadi kesalahan saat login');
            }
        });
    </script>
</body>
</html>
