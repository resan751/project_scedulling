<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkDesk</title>
    
    <!-- Global Design System CSS -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Page Specific Override CSS -->
    <link rel="stylesheet" href="/public/css/login.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Menggunakan struktur kelas yang sama dengan register page di style.css -->
    <div class="page active" id="page-login">
        
        <!-- Background Orbs (Sama persis dengan Register) -->
        <div class="login-bg-orb o1"></div>
        <div class="login-bg-orb o2"></div>
        <div class="login-bg-orb o3"></div>

        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon"><i class="fas fa-briefcase"></i></div>
                <div class="login-brand-name">Work<span>Desk</span></div>
            </div>
            
            <h2 class="login-title">Selamat Datang</h2>
            <p class="login-subtitle">Sistem Penjadwalan & Laporan Jobdesk Kerja</p>

            <form class="login-form" id="form-login">
                
                <!-- Role Selector -->
                <div class="role-selector">
                    <div class="role-btn" data-role="admin">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </div>
                    <div class="role-btn" data-role="karyawan">
                        <i class="fas fa-user"></i>
                        <span>Freelancer</span>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope fi"></i>
                        <input type="email" class="form-input" placeholder="Masukkan email" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock fi"></i>
                        <input type="password" class="form-input" placeholder="Masukkan password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="login-footer">
                Belum punya akun? <a href="register.html" style="color: var(--purple-300); font-weight: 700; text-decoration: underline;">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        // Role Selector Interaction
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
